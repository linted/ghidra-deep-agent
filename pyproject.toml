[project]
name = "ghidra-deep-agent"
version = "0.1.0"
description = "A reverse engineering deep agent with Ghidra integration via MCP"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "deepagents",
    "langchain-mcp-adapters",
    "langchain-mongodb",
    "langchain[anthropic]",
    "langchain-deepseek",
    "langchain-ollama",
    "langgraph",
    "langgraph-checkpoint-mongodb",
    "pymongo",
    "python-dotenv",
    "textual",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "mypy",
]

[tool.ruff]
target-version = "py312"
exclude = ["agent_output*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["agent_output"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
