# Full Ghidra deep-agent stack: web UI + Ghidra Server + a combined headless
# Ghidra engine / MCP bridge.
#
# MongoDB runs separately via mongodb/docker-compose.yml, which also creates the
# external `search-community` network everything here attaches to. Start Mongo
# first, then this stack:
#
#   (cd mongodb && docker compose up -d)
#   docker compose up --build
#
# Data path:
#   web (MultiServerMCPClient) --MCP--> ghidra-mcp:8081 /mcp
#       --REST--> headless engine :8089 --RMI/SSL--> ghidra-server:13100-13102
#
# Scaling note (future TODO): each ghidra-mcp container holds one program at a
# time, so concurrent agents on different binaries need one ghidra-mcp instance
# each. This file defines a single instance; dynamic per-agent provisioning is a
# follow-up.
services:
  ghidra-server:
    build: ./docker/ghidra-server
    container_name: ghidra-server
    ports:
      - "13100:13100"
      - "13101:13101"
      - "13102:13102"
    environment:
      # Service account the ghidra-mcp engine authenticates as. The entrypoint
      # provisions this user (with the password below) on first boot.
      GHIDRA_SERVER_USER: ${GHIDRA_SERVER_USER:-agent}
      GHIDRA_SERVER_PASSWORD: ${GHIDRA_SERVER_PASSWORD:-}
      # Default shared repository the entrypoint seeds on first boot via the
      # Ghidra RMI client API (svrAdmin cannot create repositories). Leave blank
      # to skip seeding. The helper connects back to this server by its
      # advertised hostname (must match the cert SAN baked in at build time).
      GHIDRA_DEFAULT_REPOSITORY: ${GHIDRA_DEFAULT_REPOSITORY:-agent-shared}
      GHIDRA_SERVER_HOST: ghidra-server
      GHIDRA_SERVER_PORT: "13100"
    volumes:
      - ghidra-repositories:/repositories
    networks:
      - search-community
    restart: unless-stopped

  ghidra-mcp:
    build: ./docker/ghidra-mcp
    container_name: ghidra-mcp
    ports:
      - "8081:8081"            # MCP bridge; engine REST (8089) stays internal
    environment:
      MCP_BRIDGE_PORT: "8081"
      GHIDRA_MCP_PORT: "8089"
      JAVA_OPTS: ${GHIDRA_JAVA_OPTS:--Xmx4g -XX:+UseG1GC}
      # Where the headless engine checks out shared programs from. Consumed by
      # GhidraServerManager when /server/connect is invoked at runtime.
      GHIDRA_SERVER_HOST: ghidra-server
      GHIDRA_SERVER_PORT: "13100"
      GHIDRA_SERVER_USER: ${GHIDRA_SERVER_USER:-agent}
      GHIDRA_SERVER_PASSWORD: ${GHIDRA_SERVER_PASSWORD:-}
      # Target repo for the binary import service (importer.py) and the max
      # upload size it will accept (defense in depth; the web tier also caps).
      GHIDRA_DEFAULT_REPOSITORY: ${GHIDRA_DEFAULT_REPOSITORY:-agent-shared}
      IMPORTER_PORT: "8082"
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-256}
    volumes:
      - ghidra-data:/data
      - ghidra-projects:/projects
    depends_on:
      - ghidra-server
    networks:
      - search-community
    restart: unless-stopped

  web:
    build: .
    container_name: ghidra-deep-agent-web
    ports:
      - "8000:8000"
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: "8000"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongod.search-community:27017}
      MONGODB_DB: ${MONGODB_DB:-checkpointing_db}
      MODEL: ${MODEL:-anthropic:claude-sonnet-4-6}
      EMBED_MODEL: ${EMBED_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GHIDRA_MCP_TRANSPORT: ${GHIDRA_MCP_TRANSPORT:-http}
      # Points at the in-network MCP bridge above.
      GHIDRA_MCP_URL: ${GHIDRA_MCP_URL:-http://ghidra-mcp:8081/mcp}
      # Binary upload import service (importer.py in the ghidra-mcp container).
      GHIDRA_IMPORTER_URL: ${GHIDRA_IMPORTER_URL:-http://ghidra-mcp:8082/import}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-256}
    depends_on:
      - ghidra-mcp
    networks:
      - search-community

networks:
  search-community:
    name: search-community
    external: true

volumes:
  ghidra-repositories:
  ghidra-data:
  ghidra-projects:
